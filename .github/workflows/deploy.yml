# Builds the PWA and publishes it to GitHub Pages.
#
# One-time setup in the repo:
#   1. Settings → Pages → Build and deployment → Source: "GitHub Actions"
#   2. Push to `main` (or run this workflow manually). The site will appear at
#      https://<owner>.github.io/<repo>/
#
# The `base` path is passed to Vite at build time so all asset URLs, the PWA
# manifest, and the service-worker scope match the GitHub Pages subpath.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
